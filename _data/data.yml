career-profile:
    title: Profile
    summary: |
      I've spent 20 years building software that works under pressure: from complex PHP and Node backends
      to JavaScript frontends to data pipelines that have to be right the first time.

      I think in systems. I debug fast, work autonomously, and go deep where others might go wide.
      My background before software was 7 years driving heavy trucks internationally: it taught
      me reliability, self-reliance, and how to solve problems alone at 3am with no backup.

      Outside of code: volunteer firefighter and first-aid medic. I show up when things go wrong.

      Core values: Truth · Loyalty · Mastery.

