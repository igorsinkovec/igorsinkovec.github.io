experiences:
    title: Professional Experience
    info:
      - role: Senior Full-Stack Developer
        time: Dec 2024 – Feb 2026
        company: Freelance, Slovenia
        details: |
          Reservation system for instructor-led classes, built for a private client.
            - Sole developer of the complete backend (OctoberCMS), admin panel, and Vue/Nuxt frontend app
            - The system handles instructor scheduling and pricing, student booking, payments and administration.
            - Collaborated with a designer/PM who handled UI/UX

      - role: Senior Software Engineer
        time: Nov 2023 – Mar 2025
        company: LELOSI, Slovenia
        details: |
          LELOSI is a clothing manufacturer and an e-commerce company.
            - Expanded the internal operations platform used across fulfillment, customer support and finance
            - Built shipping integrations for 6 international couriers including label generation, parcel tracking and automatic error recovery
            - Designed and implemented postcode validation and error correction across 18 European countries
            - Optimised system performance and extended API integrations with adjacent systems

      - role: Senior Full-Stack Developer
        time: Apr 2023 – Sep 2023
        company: VAVEN, Slovenia
        details: |
          VAVEN is a marketing platform connecting advertisers with web publishers.
          Joined to prepare the product for VC funding phase.
            - Integrated a payment processor end-to-end
            - Implemented a full design overhaul
            - Resolved a backlog of polish and stability issues across the platform

      - role: Senior Back-End Engineer
        time: Sep 2022 – Dec 2022
        company: Carbon6, USA (remote)
        details: |
          Carbon6 acquired SellerTools (see below). Continued back-end engineering
          on the same platform under new ownership.

      - role: PHP Back-End Developer
        time: Jul 2020 – Sep 2021
        company: SellerTools, Novo Mesto, Slovenia
        details: |
          SellerTools provides product ranking and optimisation services for Amazon sellers.
          Later acquired by Carbon6.
            - Developed and continuously optimised core platform services
            - Provided technical customer support

      - role: PHP Back-End Developer
        time: Jul 2018 – Apr 2020
        company: D·Labs, Ljubljana, Slovenia
        details: |
          Rejoined D·Labs (now ~100 people) as part of an international team.
            - Developed and maintained a complex multi-feature hub for the global fashion industry
            - Built a distribution and sales platform for legal cannabis products for a New York startup

      - role: Business Application Developer
        time: Mar 2013 – Sep 2017
        company: Freelance, Novo Mesto, Slovenia
        details: |
          Long-term remote projects for foreign clients. Sole developer on two major engagements.
            - Asset Management / Workflow application for an Australian sound studio, integrated with a proprietary CRM system
            - Systems monitoring application for a German IT services provider operating on river cruise ships

      - role: Web Developer
        time: Jul 2011 – Dec 2012
        company: D·Labs, Ljubljana, Slovenia
        details: |
          D·Labs specialised in full-stack startup development.
            - Luxury property rental website for a New York startup (co-located with client)
            - Subscription plan comparison platform for Slovenia's national telecom regulator
            - Global hub overhaul for wine producers and distributors (French client)

      - role: Software Developer
        time: Sep 2010 – Apr 2011
        company: 3Hops, Novo Mesto, Slovenia
        details: |
          A micro-startup with unusually complex engineering projects.
            - SCADA system for a 6MW industrial water boiler/steamer: touch-optimised desktop app in C#.NET
            - Home Automation System built from scratch including hardware components
            - Remote-controlled street lighting control software for an Italian research company

      - role: Junior Software Developer
        time: 2001, 2003 – 2004
        company: ICE Information Solutions, Ljubljana, Slovenia
        details: |
          Small company developing call centre solutions and tailor-made CRM systems.
          Joined part-time while at university; pace of learning led me to leave academia and go full-time.
            - Developed modules for CRM systems (clients included Moscow Telecom)

